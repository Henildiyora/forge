version: '3.9'
name: sample-fastapi
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
    - 8000:8000
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app
      SECRET_KEY: change-me
    depends_on:
    - postgres
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
    - 5432:5432
