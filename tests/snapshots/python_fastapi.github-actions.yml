name: sample-fastapi-ci
'on':
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: python -m pip install --upgrade pip && (python -m pip install '.[dev]'
        || python -m pip install pytest ruff mypy fastapi uvicorn)
    - name: Lint
      run: ruff check .
    - name: Type-check
      run: mypy .
    - name: Run tests
      run: pytest -q
  build:
    runs-on: ubuntu-latest
    needs:
    - test
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Build container image
      run: docker build -t ghcr.io/devops-forge/sample-fastapi:${{ github.sha }} .
